<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bgGrad" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="ringGold" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%"   stop-color="#fffacd"/>
      <stop offset="20%"  stop-color="#f0c040"/>
      <stop offset="50%"  stop-color="#c47d10"/>
      <stop offset="80%"  stop-color="#a05808"/>
      <stop offset="100%" stop-color="#7a3e00"/>
    </linearGradient>
    <linearGradient id="ringHighlight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#fff8dc" stop-opacity="0.9"/>
      <stop offset="40%"  stop-color="#e8b020" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#8b5800" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="figGold" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%"   stop-color="#fef3a0"/>
      <stop offset="30%"  stop-color="#dda020"/>
      <stop offset="70%"  stop-color="#b86800"/>
      <stop offset="100%" stop-color="#7a4000"/>
    </linearGradient>
    <linearGradient id="figHighlight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#fff5b0" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#c47d10" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Clip to circle -->
    <clipPath id="circleClip">
      <circle cx="256" cy="256" r="248"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <circle cx="256" cy="256" r="256" fill="url(#bgGrad)"/>

  <!-- Outer ambient glow -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="#c47d10" stroke-width="40" opacity="0.08"/>

  <!-- Main gold ring — leaves gap at bottom-right for green arc -->
  <!-- Gap is ~50deg at ~130deg rotation = 4-5 o'clock position -->
  <circle cx="256" cy="256" r="210"
    fill="none"
    stroke="url(#ringGold)"
    stroke-width="14"
    stroke-dasharray="1230 90"
    stroke-linecap="round"
    transform="rotate(-165, 256, 256)"
    filter="url(#glow)"/>

  <!-- Ring top highlight (shine) -->
  <circle cx="256" cy="256" r="210"
    fill="none"
    stroke="url(#ringHighlight)"
    stroke-width="5"
    stroke-dasharray="400 1000"
    stroke-linecap="round"
    transform="rotate(-195, 256, 256)"
    opacity="0.7"/>

  <!-- Green accent arc — bottom-right ~4-5 o'clock -->
  <circle cx="256" cy="256" r="210"
    fill="none"
    stroke="url(#greenGrad)"
    stroke-width="14"
    stroke-dasharray="70 1300"
    stroke-linecap="round"
    transform="rotate(-25, 256, 256)"
    filter="url(#glow)"/>

  <!-- ===== FIGURE ===== -->
  <!-- Head -->
  <circle cx="256" cy="132" r="34" fill="url(#figGold)" filter="url(#glow)"/>
  <!-- Head highlight -->
  <ellipse cx="245" cy="120" rx="14" ry="10" fill="url(#figHighlight)" opacity="0.7"/>

  <!-- Left arm: shoulder → lower-left (the V left branch) -->
  <line x1="256" y1="178"
        x2="148" y2="282"
        stroke="url(#figGold)" stroke-width="34" stroke-linecap="round"
        filter="url(#glow)"/>
  <!-- Left arm highlight -->
  <line x1="256" y1="178"
        x2="148" y2="282"
        stroke="url(#figHighlight)" stroke-width="14" stroke-linecap="round" opacity="0.5"/>

  <!-- Right arm: shoulder → upper-right (the V right branch, raised higher) -->
  <line x1="256" y1="178"
        x2="355" y2="240"
        stroke="url(#figGold)" stroke-width="34" stroke-linecap="round"
        filter="url(#glow)"/>
  <!-- Right arm highlight -->
  <line x1="256" y1="178"
        x2="355" y2="240"
        stroke="url(#figHighlight)" stroke-width="14" stroke-linecap="round" opacity="0.5"/>

  <!-- Hip/join -->
  <circle cx="256" cy="300" r="20" fill="url(#figGold)"/>

  <!-- Left leg: hip → lower-left -->
  <line x1="256" y1="300"
        x2="185" y2="400"
        stroke="url(#figGold)" stroke-width="30" stroke-linecap="round"
        filter="url(#glow)"/>
  <!-- Left leg highlight -->
  <line x1="256" y1="300"
        x2="185" y2="400"
        stroke="url(#figHighlight)" stroke-width="12" stroke-linecap="round" opacity="0.4"/>

  <!-- Right leg: hip → lower-right -->
  <line x1="256" y1="300"
        x2="320" y2="395"
        stroke="url(#figGold)" stroke-width="30" stroke-linecap="round"
        filter="url(#glow)"/>
  <!-- Right leg highlight -->
  <line x1="256" y1="300"
        x2="320" y2="395"
        stroke="url(#figHighlight)" stroke-width="12" stroke-linecap="round" opacity="0.4"/>
</svg>
